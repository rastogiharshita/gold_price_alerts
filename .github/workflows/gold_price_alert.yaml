name: Gold Price Alert
on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 1:30 PM
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  notify_and_update_tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve script for repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run the notification script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python gold_price_alert.py
      - name: Detect workbook changes
        id: detect_changes
        run: |
          git add gold_price_tracking.xlsx
          if git diff --cached --quiet -- gold_price_tracking.xlsx; then
            echo "xlsx_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "xlsx_changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit updated tracking workbook
        if: steps.detect_changes.outputs.xlsx_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gold_price_tracking.xlsx
          git commit -m "Update gold price tracking workbook"
          git push origin HEAD:${{ github.ref_name }}
